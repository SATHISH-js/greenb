              </div>

              <div className="p-6 sm:p-10 md:w-3/5">
                <form className="space-y-4 sm:space-y-6" onSubmit={(e) => e.preventDefault()}>
                  <div><label className="block text-stone-700 font-medium mb-1.5 sm:mb-2 text-sm sm:text-base">{t.namePlaceholder}</label><input type="text" className="w-full bg-stone-50 border border-stone-200 rounded-xl p-3 sm:p-4 text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-green-500 transition-shadow" placeholder={t.namePlaceholder} /></div>
                  <div><label className="block text-stone-700 font-medium mb-1.5 sm:mb-2 text-sm sm:text-base">{t.emailPlaceholder}</label><input type="email" className="w-full bg-stone-50 border border-stone-200 rounded-xl p-3 sm:p-4 text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-green-500 transition-shadow" placeholder={t.emailPlaceholder} /></div>
                  <div><label className="block text-stone-700 font-medium mb-1.5 sm:mb-2 text-sm sm:text-base">{t.messagePlaceholder}</label><textarea rows="4" className="w-full bg-stone-50 border border-stone-200 rounded-xl p-3 sm:p-4 text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-green-500 transition-shadow" placeholder={t.messagePlaceholder}></textarea></div>
                  <button className="w-full bg-green-600 text-white font-bold py-3 sm:py-4 rounded-xl hover:bg-green-700 transition-colors shadow-lg text-sm sm:text-base">{t.submitBtn}</button>
                </form>
              </div>
            </div>
          </div>
        );

        // --- MAIN APP COMPONENT ---
        function App() {
          const [lang, setLang] = useState('en');
          const [activeTab, setActiveTab] = useState(0);
          
          const t = translations[lang];

          const [isChatOpen, setIsChatOpen] = useState(false);
          const [chatInput, setChatInput] = useState('');
          const [chatMessages, setChatMessages] = useState([
            { text: t.chatDefaultGreeting, isBot: true, action: null }
          ]);
          const chatEndRef = useRef(null);

          // Chatbot logic
          useEffect(() => {
            setChatMessages([{ text: translations[lang].chatDefaultGreeting, isBot: true, action: null }]);
          }, [lang]);

          useEffect(() => {
            if (chatEndRef.current) {
              chatEndRef.current.scrollIntoView({ behavior: "smooth" });
            }
          }, [chatMessages, isChatOpen]);

          const handleTabChange = (index) => {
            setActiveTab(index);
            if(window.innerWidth < 1024) setIsChatOpen(false); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleChatSubmit = (e) => {
            e.preventDefault();
            if (!chatInput.trim()) return;

            const newMessages = [...chatMessages, { text: chatInput, isBot: false, action: null }];
            setChatMessages(newMessages);
            const inputLower = chatInput.toLowerCase();
            setChatInput('');

            setTimeout(() => {
              let botResponse = t.chatResponses.default;
              if (inputLower.match(/rating|leed|griha|breeam|green star|certificate/)) { botResponse = t.chatResponses.rating; } 
              else if (inputLower.match(/material|stone|laterite|brick|mud block|lime pozzolana|gypsum|fiber|bamboo|recycle|plastic|aac|concrete/)) { botResponse = t.chatResponses.material; } 
              else if (inputLower.match(/tech|wall|flemish|rat trap|cavity|ferro|filler slab|pre cast|septic/)) { botResponse = t.chatResponses.tech; } 
              else if (inputLower.match(/cost|price|budget|rupee|cheap|expensive|package/)) { botResponse = t.chatResponses.cost; } 
              else if (inputLower.match(/solar|sun|energy|heating|cooling/)) { botResponse = t.chatResponses.solar; } 
              else if (inputLower.match(/global warming|environment|quarrying|pollution|emission/)) { botResponse = t.chatResponses.environment; }
              setChatMessages(prev => [...prev, { text: botResponse.text, isBot: true, action: botResponse.action }]);
            }, 600); 
          };

          const TabIcons = ['house', 'gear', 'cube', 'briefcase', 'phone'];

          return (
            <div className="min-h-screen bg-stone-50 font-sans text-stone-800 selection:bg-green-200 selection:text-green-900 pb-20 lg:pb-0 flex flex-col overflow-x-hidden relative">
              
              {/* Header */}
              <header className="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-stone-200 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-16 sm:h-20">
                    <div className="flex items-center gap-2 sm:gap-3 cursor-pointer" onClick={() => handleTabChange(0)}>
                      <div className="bg-green-600 text-white p-2 sm:p-2.5 rounded-xl shadow-md shrink-0"><IconFill name="leaf" size={24} /></div>
                      <div>
                        <h1 className="text-xl sm:text-2xl font-black text-stone-800 tracking-tight leading-none">{t.appTitle}</h1>
                        <p className="text-[10px] sm:text-xs font-semibold text-green-600 uppercase tracking-widest truncate max-w-[150px] sm:max-w-none">{t.consultant}</p>
                      </div>
                    </div>

                    <nav className="hidden lg:flex items-center space-x-1 xl:space-x-2">
                      {t.tabs.map((tabName, idx) => (
                        <button key={idx} onClick={() => handleTabChange(idx)} className={`flex items-center gap-2 px-3 xl:px-4 py-2.5 rounded-full font-medium transition-all duration-200 text-sm xl:text-base ${ activeTab === idx ? 'bg-green-100 text-green-800 shadow-sm' : 'text-stone-600 hover:bg-stone-100 hover:text-stone-900' }`}>
                          <IconFill name={TabIcons[idx]} size={18} /> {tabName}
                        </button>
                      ))}
                    </nav>

                    <div className="flex items-center gap-2 sm:gap-4">
                      <button onClick={() => setLang(lang === 'en' ? 'ta' : 'en')} className="flex items-center gap-1.5 sm:gap-2 bg-stone-100 hover:bg-stone-200 text-stone-800 px-3 py-1.5 sm:px-4 sm:py-2 rounded-full font-bold text-xs sm:text-sm transition-colors border border-stone-200" title="Switch Language">
                        <Icon name="globe" size={14} className="text-green-600" /> {lang === 'en' ? 'தமிழ்' : 'ENG'}
                      </button>
                    </div>
                  </div>
                </div>
              </header>

              <main className="flex-grow max-w-7xl mx-auto w-full px-2 sm:px-6 lg:px-8 py-6 sm:py-10 flex flex-col relative z-10">
                {activeTab === 0 && <HomeTab t={t} lang={lang} handleTabChange={handleTabChange} />}
                {activeTab === 1 && <ServicesTab t={t} lang={lang} />}
                {activeTab === 2 && <MaterialsTab t={t} lang={lang} />}
                {activeTab === 3 && <ProjectsTab t={t} lang={lang} />}
                {activeTab === 4 && <ContactTab t={t} lang={lang} />}
              </main>

              {/* FOOTER */}
              <footer className="bg-stone-900 text-stone-400 py-10 sm:py-12 text-center px-4 mt-auto mb-16 lg:mb-0 relative z-10">
                <div className="max-w-4xl mx-auto flex flex-col items-center">
                  <div className="flex justify-center mb-4 sm:mb-6 text-green-500 bg-stone-800 p-4 rounded-full shadow-inner"><IconFill name="leaf" size={32} /></div>
                  <p className="text-sm sm:text-base text-stone-300 font-bold mb-6">{t.footerText}</p>
                  <div className="w-24 h-px bg-stone-700 mb-6"></div>
                  <div className="space-y-2 text-xs sm:text-sm md:text-base">
                     <p><span className="text-stone-500">{lang === 'en' ? 'Created by:' : 'உருவாக்கியவர்:'}</span> <span className="text-white font-bold tracking-wide">SATHISH S</span></p>
                     <p><span className="text-stone-500">{lang === 'en' ? 'Email:' : 'மின்னஞ்சல்:'}</span> <a href="mailto:sathish1204js@gmail.com" className="text-green-400 hover:text-green-300 transition-colors ml-1">sathish1204js@gmail.com</a></p>
                     <p className="text-stone-400 font-semibold mt-2 pt-2">ANNAPOORANA ENGINEERING COLLEGE</p>
                     <p className="text-stone-500">Salem</p>
                  </div>
                </div>
              </footer>

              {/* Mobile Nav */}
              <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)] z-40 transition-transform pb-safe">
                <div className="flex justify-around items-center h-16 sm:h-20 px-1 sm:px-2">
                  {t.tabs.map((tabName, idx) => (
                    <button key={idx} onClick={() => handleTabChange(idx)} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${ activeTab === idx ? 'text-green-600' : 'text-stone-400 hover:text-stone-600' }`}>
                      <IconFill name={TabIcons[idx]} size={20} className={activeTab === idx ? 'scale-110 transition-transform' : ''} />
                      <span className="text-[10px] sm:text-xs font-semibold max-w-[64px] sm:max-w-[80px] truncate w-full text-center tracking-tight">{tabName}</span>
                    </button>
                  ))}
                </div>
              </nav>

              {/* Chatbot */}
              <div className="fixed bottom-20 lg:bottom-8 right-4 lg:right-8 z-50 flex flex-col items-end">
                {isChatOpen && (
                  <div className="bg-white w-[90vw] sm:w-96 rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.3)] border border-stone-200 overflow-hidden mb-4 animate-in flex flex-col h-[65vh] sm:h-[480px]">
                    <div className="bg-green-700 text-white p-4 flex justify-between items-center shrink-0 shadow-sm z-10">
                      <div className="flex items-center gap-2 font-bold"><IconFill name="leaf" size={20} /> {t.chatTitle}</div>
                      <button onClick={() => setIsChatOpen(false)} className="text-green-200 hover:text-white transition-colors bg-green-800/50 p-1 rounded-full"><Icon name="x" size={20} /></button>
                    </div>
                    
                    <div className="flex-grow p-4 overflow-y-auto bg-stone-50 space-y-4">
                      {chatMessages.map((msg, idx) => (
                        <div key={idx} className={`flex ${msg.isBot ? 'justify-start' : 'justify-end'}`}>
                          <div className={`max-w-[85%] rounded-2xl p-3.5 text-sm shadow-sm flex flex-col gap-2 ${msg.isBot ? 'bg-white border border-stone-200 text-stone-700 rounded-tl-none' : 'bg-green-600 text-white rounded-tr-none'}`}>
                            <p className="leading-relaxed">{msg.text}</p>
                            {msg.action && (
                              <button onClick={() => handleTabChange(msg.action.tabIndex)} className="mt-1 flex items-center justify-center gap-1.5 self-start text-[11px] font-bold uppercase tracking-wider bg-green-100 text-green-800 px-3 py-1.5 rounded-full hover:bg-green-200 hover:scale-105 transition-all shadow-sm border border-green-200">
                                {msg.action.label} <Icon name="arrow-right" size={12} />
                              </button>
                            )}
                          </div>
                        </div>
                      ))}
                      <div ref={chatEndRef} />
                    </div>

                    <div className="p-3 bg-white border-t border-stone-200 shrink-0">
                      <form onSubmit={handleChatSubmit} className="flex gap-2">
                        <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder={t.chatPlaceholder} className="flex-grow bg-stone-100 border border-stone-200 rounded-full px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:bg-white transition-all"/>
                        <button type="submit" className="bg-green-600 text-white p-2.5 rounded-full hover:bg-green-700 transition-colors shrink-0 shadow-md"><IconFill name="paper-plane-right" size={18} /></button>
                      </form>
                    </div>
                  </div>
                )}

                <button onClick={() => setIsChatOpen(!isChatOpen)} className={`${isChatOpen ? 'bg-stone-800' : 'bg-green-600'} text-white p-4 rounded-full shadow-2xl hover:scale-105 transition-all duration-300 flex items-center justify-center border-4 border-white/20`}>
                  {isChatOpen ? <Icon name="x" size={28} /> : <IconFill name="leaf" size={28} className={activeTab === 0 ? "animate-bounce" : "animate-pulse"} />}
                </button>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
